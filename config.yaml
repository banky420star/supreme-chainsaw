trading:
  symbols:
    - BTCUSDm
    - XAUUSDm
  timeframe: M5
  risk_percent: 1.0
  max_drawdown: 10.0
  confidence_threshold: 0.85
  magic_number: 505

risk:
  max_daily_loss: 1000
  max_daily_trades: 500
  max_daily_trades_per_symbol: 50
  max_daily_losing_trades_per_symbol: 10
  max_lots: 1.0
  supervisor:
    enabled: true
    max_daily_loss: 1000
    max_drawdown_pct: 8.0
    max_symbol_exposure: 0.35
    max_total_exposure: 1.2
    max_open_positions: 6
    max_positions_per_symbol: 3
    min_trade_interval_sec: 45
    max_spread_bps: 25.0

telegram:
  token: ""
  chat_id: ""

event_intel:
  enabled: true
  poll_sec: 60
  pre_event_min: 60
  post_event_min: 30
  news_hold_min: 20
  max_events: 200

drl:
  total_timesteps: 500000
  per_symbol: true
  period: 90d
  interval: M5
  candles_per_symbol: 100000
  eval_period: 120d
  model_path: models/ppo_trading.zip
  feature_version: ultimate_150
  data_source: mt5
  optuna_trials: 0
  optuna_timesteps: 10000
  dreamer:
    enabled: true
    train_in_cycle: true
    steps: 5000
    window: 64
    feature_version: ultimate_150
    symbols:
      - BTCUSDm
      - XAUUSDm
  ensemble:
    enabled: false
    min_votes: 2
    agreement_threshold: 0.5
  reward:
    version: v2_risk_adjusted
    weights:
      growth: 8.0
      payoff: 2.0
      sharpe_bonus: 1.0
      drawdown_penalty: 3.0
      cost_penalty: 5.0
      churn_penalty: 0.5
      memory_expectancy_bonus: 0.5
      loss_streak_penalty: 0.4

training:
  lstm_epochs: 20
  per_symbol: true
  lstm_period: 90d
  lstm_interval: M5
  lstm_candles: 100000
  feature_version: ultimate_150
  data_source: mt5

evaluation:
  max_drawdown: 0.25        # relaxed from 0.10 — allow early-stage candidates
  min_sharpe: -0.5          # relaxed from 0.30 — accept negative-sharpe initial models
  min_return: -0.10         # relaxed from 0.015 — allow small losses during warm-up
  score_margin: 0.05        # relaxed from 0.30 — easier to beat null champion
  min_steps_per_symbol: 600
  min_pass_rate: 0.5        # relaxed from 0.80
  return_margin: 0.0
  sharpe_margin: 0.0        # relaxed from 0.05
  drawdown_margin: 0.0
  forward_windows:
    - 60d
    - 90d
    - 120d
  min_forward_win_rate: 0.34  # relaxed from 0.67 — 1/3 windows need to win

registry:
  ensemble:
    history_limit: 3
  canary_policy:
    default:
      min_trades: 30
      min_realized_pnl: 0.0
      max_drawdown: 0.12
      min_runtime_minutes: 45
    per_symbol:
      BTCUSDm:
        max_drawdown: 0.08
        min_trades: 60

data:
  source: mt5

cycle:
  skip_completed_training: false
  parallel_symbols: true
  max_parallel_symbols: 2

