# =============================================================================
# Chain Gambler — nginx Reverse Proxy Configuration
# Routes:
#   /api/*  → backend container (port 9090)
#   /ws     → backend WebSocket/SSE endpoint
#   /*      → frontend container (port 80)
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Log format: JSON-friendly for structured log ingestion
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Tune for API + SSE workloads
    sendfile            on;
    keepalive_timeout   65;
    client_max_body_size 10M;

    # Upstream definitions — use Docker service names as hostnames
    upstream backend {
        server backend:9090;
        keepalive 16;   # Reuse connections to reduce latency on frequent API calls
    }

    upstream frontend {
        server frontend:80;
        keepalive 4;
    }

    server {
        listen 80;
        server_name _;  # Accept any hostname; restrict this for multi-tenant setups

        # ------------------------------------------------------------------
        # API — proxied to the Bottle/Python backend
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Longer timeout for training-trigger endpoints that can block
            proxy_read_timeout    120s;
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;

            # Disable response buffering so SSE streams are delivered in real time
            proxy_buffering    off;
            proxy_cache        off;
        }

        # ------------------------------------------------------------------
        # WebSocket / Server-Sent Events
        # Bottle uses SSE via the /api/stream endpoints; also handle bare /ws
        # ------------------------------------------------------------------
        location /ws {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;  # Keep long-lived SSE connections alive
            proxy_buffering    off;
        }

        # ------------------------------------------------------------------
        # Frontend SPA — everything else goes to the React app
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ------------------------------------------------------------------
        # Security headers
        # ------------------------------------------------------------------
        add_header X-Content-Type-Options  "nosniff"         always;
        add_header X-Frame-Options         "SAMEORIGIN"      always;
        add_header X-XSS-Protection        "1; mode=block"   always;
        add_header Referrer-Policy         "same-origin"     always;
    }
}
