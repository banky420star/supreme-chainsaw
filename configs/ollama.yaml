# Ollama Council configuration for local Windows/VPS inference.
# This layer advises, reviews, summarizes, and proposes safer patches.
# It must not bypass deterministic risk gates or directly execute trades.

ollama:
  enabled: true
  base_url: "${OLLAMA_BASE_URL:http://127.0.0.1:11434}"
  timeout_seconds: 90
  temperature: 0.15
  num_ctx: 8192
  max_prompt_chars: 24000
  allow_config_patch_suggestions: true
  allow_live_trade_actions: false

  council:
    code_architect: "qwen3-coder-next"
    strategy_reviewer: "qwen3"
    failure_detective: "deepseek-r1:14b"
    chief_analyst: "llama3.3"
    embedder: "nomic-embed-text"

  live_guardrails:
    advisory_only: true
    deterministic_risk_engine_is_authority: true
    allowed_operator_recommendations:
      - HOLD
      - REDUCE_SIZE
      - PAUSE_SYMBOL
      - PAUSE_ALL
      - REVIEW_ONLY
    forbidden_direct_actions:
      - BUY
      - SELL
      - INCREASE_SIZE
      - REMOVE_STOP_LOSS
      - DISABLE_RISK_ENGINE
