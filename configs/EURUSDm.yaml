asset_class: forex
canary_policy:
  max_drawdown: 0.1
  min_realized_pnl: 0.0
  min_runtime_minutes: 45
  min_trades: 30
data:
  interval: 5m
  min_rows: 1000
  period: 60d
drl:
  batch_size: 512
  clip_range: 0.2
  ent_coef: 0.005
  feature_version: engineered_v2
  gae_lambda: 0.95
  gamma: 0.995
  initial_balance: 10000.0
  learning_rate: 1e-4
  lstm_feature_extractor:
    features_dim: 256
    lstm_hidden: 128
    lstm_layers: 2
    portfolio_feature_count: 3
    window_size: 100
  n_envs: 4
  n_epochs: 10
  n_steps: 4096
  sde_sample_freq: 4
  target_kl: 0.01
  total_timesteps: 100000
  use_sde: true
lstm:
  batch_size: 64
  class_weights: auto
  dropout: 0.3
  early_stopping_patience: 7
  epochs: 50
  hidden_size: 128
  learning_rate: 0.001
  lr_factor: 0.5
  lr_patience: 3
  lr_scheduler: ReduceLROnPlateau
  num_layers: 3
  seq_len: 60
  volatility_thresholds:
    high: 0.0015
    low: 0.0005
risk:
  max_drawdown_pct: 5.0
  max_lots: 0.5
  max_positions_per_symbol: 3
  sl_atr_mult: 2.0
  tp_atr_mult: 3.0
  trailing_distance_atr: 1.0
  trailing_trigger_atr: 1.5
symbol: EURUSDm
timeframe: M5
