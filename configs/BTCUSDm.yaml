# Per-symbol configuration for BTCUSDm (Bitcoin)
# Bitcoin is extremely volatile. Smaller positions, wider stops, longer training.

symbol: BTCUSDm
asset_class: crypto
timeframe: M5

data:
  period: 60d
  interval: 5m
  min_rows: 1000

lstm:
  seq_len: 60
  epochs: 60              # More epochs for crypto's complex patterns
  batch_size: 64
  learning_rate: 0.001
  lr_scheduler: ReduceLROnPlateau
  lr_patience: 3
  lr_factor: 0.5
  early_stopping_patience: 7
  dropout: 0.3
  hidden_size: 128
  num_layers: 3
  class_weights: auto
  volatility_thresholds:
    low: 0.0020           # Crypto has huge moves
    high: 0.0050

drl:
  total_timesteps: 150000  # More timesteps for crypto
  n_envs: 4
  learning_rate: 1e-4
  n_steps: 4096
  batch_size: 512
  n_epochs: 10
  gamma: 0.995
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.005
  target_kl: 0.01
  use_sde: true
  sde_sample_freq: 4
  initial_balance: 10000.0
  feature_version: engineered_v2
  lstm_feature_extractor:
    features_dim: 256
    window_size: 100
    portfolio_feature_count: 3
    lstm_hidden: 128
    lstm_layers: 2

risk:
  max_lots: 0.01
  max_positions_per_symbol: 2
  max_drawdown_pct: 5.0
  sl_atr_mult: 4.0        # Wider stops for BTC's extreme volatility (was 3.0 — all 3 losses from SL too tight)
  tp_atr_mult: 2.0        # Reduced from 3.0 — 0% TP rate across 12 trades, was unreachable
  trailing_trigger_atr: 2.0   # Start trailing after 2.0x ATR profit (widened from 1.5)
  trailing_distance_atr: 2.0  # Trail at wider distance (was 1.5 — BTC needs more room)

canary_policy:
  min_trades: 60           # More trades needed to evaluate crypto
  min_realized_pnl: 0.0
  max_drawdown: 0.08
  min_runtime_minutes: 60