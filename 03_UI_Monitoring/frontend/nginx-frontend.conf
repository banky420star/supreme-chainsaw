# =============================================================================
# Chain Gambler Frontend — nginx SPA Site Config
# Serves the Vite-built React dist/ with HTML5 history fallback.
# This file is mounted into the frontend container at:
#   /etc/nginx/conf.d/default.conf
# =============================================================================

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # React Router / Vite base: all paths fall back to index.html so the SPA
    # handles client-side routing. Without this, hard-refreshes on any route
    # other than "/" return 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ------------------------------------------------------------------
    # Static asset caching
    # Vite fingerprints JS/CSS filenames with content hashes, so these
    # files are safe to cache immutably for 1 year.
    # ------------------------------------------------------------------
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # Security headers (defence-in-depth; outer nginx also sets these)
    # ------------------------------------------------------------------
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-Frame-Options        "SAMEORIGIN" always;

    # ------------------------------------------------------------------
    # Gzip compression for text assets
    # ------------------------------------------------------------------
    gzip            on;
    gzip_types      text/plain text/css application/javascript
                    application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary       on;
}
